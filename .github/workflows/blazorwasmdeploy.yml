name: Build and Deploy Blazor WASM to GitHub Pages
on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup .NET Core SDK
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: 10.x

            - name: Publish .NET Core Project
              run: dotnet publish ${{ github.event.repository.name }}/${{ github.event.repository.name }}.csproj -c Release -o release --nologo

            - name: Change base-tag in index.html from / to Pages subdirectory
              run: |
                BASE_HREF="/${{ github.event.repository.name }}/"
                sed -i "s|<base href=\"/\" />|<base href=\"${BASE_HREF}\" />|g" release/wwwroot/index.html

            - name: Copy index.html to 404.html
              run: cp release/wwwroot/index.html release/wwwroot/404.html

            - name: Stamp version with git SHA
              run: echo '{"version":"${{ github.sha }}"}' > release/wwwroot/version.json

            - name: Cache-bust local assets
              run: |
                SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
                sed -i "s/\.css\"/\.css?v=${SHORT_SHA}\"/g" release/wwwroot/index.html
                sed -i "s/\.js?v=[^\"]*\"/\.js?v=${SHORT_SHA}\"/g" release/wwwroot/index.html

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v4
              with:
                  path: release/wwwroot

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
